version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: scanoshop_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_shopping
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: scanoshop_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: scanoshop_backend
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/smart_shopping
      REDIS_URL: redis://redis:6379
      PORT: 5000
      JWT_SECRET: supersecretjwtkey
      RAZORPAY_KEY_ID: rzp_test_dummy
      RAZORPAY_KEY_SECRET: rzp_test_dummy_secret
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma generate && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scanoshop_frontend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_RAZORPAY_KEY_ID: rzp_test_dummy
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
